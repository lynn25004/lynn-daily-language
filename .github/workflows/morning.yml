name: Morning Lesson (09:00 Taipei, Mon-Sat)

on:
  # 排程交給 cron-job.org（jobId 7516774）經由 API 觸發 workflow_dispatch。
  # GitHub 內建 schedule 已移除，因其在免費 tier 常跳過不跑。
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate & push morning lesson
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Taipei
        run: python scripts/coach.py morning

      - name: Commit today's lesson
        run: |
          git config user.name  "daily-coach-bot"
          git config user.email "bot@users.noreply.github.com"
          git add lessons/
          if ! git diff --cached --quiet; then
            DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
            git commit -m "lesson: morning $DATE"
            git push
          else
            echo "No lesson changes to commit."
          fi
