name: Watchdog (hourly catch-up)

on:
  schedule:
    # 每小時 10 分跑（避開主 workflow 的 :00 尖峰）
    - cron: "10 2-23 * * *"
    # 23:30 Taipei 專門補晚課（主 evening 排程在 23:00 Taipei，給 30 分鐘 buffer）
    - cron: "30 15 * * 1-6"
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check & catch-up
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_IDS: ${{ secrets.LINE_USER_IDS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Taipei
        run: python scripts/watchdog.py

      - name: Commit any new lesson/marker files
        run: |
          git config user.name  "watchdog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add lessons/
          if ! git diff --cached --quiet; then
            DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
            git commit -m "watchdog: catch-up $DATE"
            git push
          else
            echo "No changes to commit."
          fi
